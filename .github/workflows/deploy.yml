name: 🚀 Deploy Huit Demo Player

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - name: Deployed
        run: echo "✅ Build validated — Vercel deploys automatically via Git integration"
